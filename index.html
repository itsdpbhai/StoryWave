<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryWave - Premium Audio Stories</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #e50914; /* Netflix Red style */
            --secondary-color: #ff4b2b;
            --bg-dark: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.08);
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #2b1010, #0f0f0f);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Subtle Background Blur Circles */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-color);
            filter: blur(150px);
            border-radius: 50%;
            z-index: -1;
            top: 10%;
            left: 10%;
            opacity: 0.2;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-white);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo span {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .logo-icon {
            background: var(--primary-color);
            color: white;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.8rem;
            box-shadow: 0 0 15px var(--primary-color);
        }

        h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 25px;
            color: var(--text-white);
            font-weight: 400;
        }

        /* Form Inputs */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-group input:focus + i {
            color: var(--primary-color);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            left: auto !important;
            cursor: pointer;
            color: var(--text-gray);
        }

        /* Options row */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
            color: var(--text-gray);
        }

        .options label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .options a {
            color: var(--primary-color);
            text-decoration: none;
            transition: 0.3s;
        }

        .options a:hover { text-decoration: underline; }

        /* Buttons */
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.4);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
            color: var(--text-gray);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--glass-border);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #333;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .google-btn:hover { background: #f1f1f1; }

        /* Footer */
        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .footer-link span {
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 600;
        }

        /* Error/Toast Style */
        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4b2b;
            padding: 12px 25px;
            border-radius: 8px;
            transition: 0.5s;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .toast.show { top: 20px; }

        /* Spinner for loading */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; margin: 15px; }
            .logo { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">Please check your inputs!</div>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo">
                <div class="logo-icon">द</div>
                Story<span>Wave</span>
            </div>
            <h2>Premium Audio Stories</h2>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa-solid fa-eye-slash toggle-password" id="togglePass"></i>
            </div>

            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login" id="loginSubmit">
                <span id="btnText">Login</span>
                <div class="spinner" id="loader"></div>
            </button>

            <div class="divider">OR</div>

            <button type="button" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="Google">
                Continue with Google
            </button>
        </form>

        <p class="footer-link">Don't have an account? <span>Sign Up</span></p>
    </div>

    <script>
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const togglePass = document.getElementById('togglePass');
        const toast = document.getElementById('toast');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        // Toggle Password Visibility
        togglePass.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            togglePass.classList.toggle('fa-eye');
            togglePass.classList.toggle('fa-eye-slash');
        });

        // Show Toast Function
        function showToast(msg, color = "#ff4b2b") {
            toast.innerText = msg;
            toast.style.background = color;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Form Validation & Submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const emailValue = emailInput.value.trim();
            const passValue = passInput.value.trim();

            // Simple Regex for email validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(emailValue)) {
                showToast("Please enter a valid email address!");
                return;
            }

            if (passValue.length < 6) {
                showToast("Password must be at least 6 characters!");
                return;
            }

            // Start Loading Animation
            btnText.style.display = 'none';
            loader.style.display = 'block';
            document.getElementById('loginSubmit').disabled = true;

            // Mocking an API call
            setTimeout(() => {
                loader.style.display = 'none';
                btnText.style.display = 'block';
                btnText.innerText = 'Success!';
                showToast("Login Successful! Welcome back.", "#2ecc71");
                
                // Reset button after success
                setTimeout(() => {
                    document.getElementById('loginSubmit').disabled = false;
                    btnText.innerText = 'Login';
                }, 2000);
            }, 2000);
        });
    </script>
</body>
</html>
